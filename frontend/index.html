<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Previsione Polidramnios</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4 py-md-5">
    <div class="card shadow-sm mx-auto app-card">

      <div class="card-header app-header">
        <h1 class="h4 mb-0">Previsione Polidramnios</h1>
        <small>Stima del rischio a partire dai dati clinici della paziente</small>
      </div>

      <div class="card-body">
        <form id="form" novalidate>
          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label" for="eta">Età <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="number" step="1" class="form-control" id="eta" required>
                <span class="input-group-text">anni</span>
              </div>
              <div class="form-text">14 – 55</div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="pressione">Pressione diastolica <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="number" step="1" class="form-control" id="pressione" required>
                <span class="input-group-text">mmHg</span>
              </div>
              <div class="form-text">40 – 130</div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="gravidanze">Gravidanze pregresse <span class="text-danger">*</span></label>
              <input type="number" step="1" class="form-control" id="gravidanze" required>
              <div class="form-text">0 – 20</div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="cesarei">Tagli cesarei pregressi <span class="text-danger">*</span></label>
              <input type="number" step="1" class="form-control" id="cesarei" required>
              <div class="form-text">0 – 12 (non oltre le gravidanze)</div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="insulina">Insulina sierica (2 ore) <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="number" step="0.1" class="form-control" id="insulina" required>
                <span class="input-group-text">µU/ml</span>
              </div>
              <div class="form-text">0 – 400</div>
            </div>

            <div class="col-12"><hr class="my-1"></div>

            <!-- BMI calcolato da altezza + peso -->
            <div class="col-md-4">
              <label class="form-label" for="altezza">Altezza <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="number" step="0.1" class="form-control" id="altezza" required>
                <span class="input-group-text">cm</span>
              </div>
              <div class="form-text">120 – 220</div>
            </div>

            <div class="col-md-4">
              <label class="form-label" for="peso">Peso <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="number" step="0.1" class="form-control" id="peso" required>
                <span class="input-group-text">kg</span>
              </div>
              <div class="form-text">30 – 250</div>
            </div>

            <div class="col-md-4">
              <label class="form-label" for="bmi">Indice di Massa Corporea</label>
              <div class="input-group">
                <input type="text" class="form-control" id="bmi" readonly placeholder="—">
                <span class="input-group-text">kg/m²</span>
              </div>
              <div class="form-text">calcolato (14 – 60)</div>
            </div>

            <div class="col-12"><hr class="my-1"></div>

            <div class="col-md-6">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="diabeteGest">
                <label class="form-check-label" for="diabeteGest">Diabete gestazionale</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="diabetePreg">
                <label class="form-check-label" for="diabetePreg">Diabete pregravidico</label>
              </div>
            </div>

          </div>

          <div id="errore" class="alert alert-danger mt-4 d-none" role="alert"></div>

          <button type="submit" class="btn btn-primary w-100 mt-4" id="invia">Calcola previsione</button>
        </form>

        <!-- Risultato -->
        <div id="risultato" class="mt-4 d-none">
          <div class="result-box text-center p-4">
            <div class="fs-5 text-muted mb-1">Esito</div>
            <div id="esito" class="fs-3 fw-bold mb-3">—</div>
            <div class="progress" role="progressbar">
              <div id="barra" class="progress-bar" style="width:0%"></div>
            </div>
            <div class="mt-2"><strong id="prob">0%</strong> di probabilità stimata di Polidramnios</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
